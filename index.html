<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harry Potter TCG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Code+Pro:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/board.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/overlays.css">
  <link rel="stylesheet" href="css/modals.css">
  <script src="js/version.js"></script>
</head>
<body>

<script>
  // Redirect to deck selection if no deck choice has been made yet
  if (!localStorage.getItem('hptcg-deck-choice')) {
    location.replace('deck_select.html');
  }
</script>

<!-- Game Over Screen -->
<div class="overlay" id="gameover-screen" style="display:none">
  <div class="overlay-box">
    <div class="overlay-title" id="gameover-title"></div>
    <div class="overlay-subtitle" id="gameover-subtitle"></div>
    <div class="gameover-stats" id="gameover-stats"></div>
    <button class="overlay-btn" onclick="UI.restartGame()">PLAY AGAIN</button>
    <button class="overlay-btn ghost-btn" onclick="UI.changeDecks()">CHANGE DECKS</button>
  </div>
</div>

<!-- Hermione Ability Prompt -->
<div id="hermione-prompt">
  <span>Hermione: Play a second lesson for free?</span>
  <button class="hermione-btn" id="btn-hermione-skip" onclick="UI.hermioneSkip()">Skip</button>
</div>

<!-- Target Selection Banner -->
<div id="target-banner">
  <span>Choose a target for your spell</span>
  <button class="hermione-btn" onclick="UI.cancelTargetMode()">Cancel</button>
</div>

<!-- Take Root: opponent-forced creature discard prompt -->
<div id="take-root-banner">
  <span>Take Root — choose one of your creatures to discard</span>
</div>

<!-- Spell Staging (injected by JS) -->
<div id="spell-staging-container"></div>

<!-- ══════════════════════════════════════════
     MAIN BOARD
     ══════════════════════════════════════════ -->
<main class="board-main">

  <!-- Bot Hand (top) -->
  <div class="bot-hand-row" id="bot-hand-row">
    <div class="play-area-deck-name bot-area-name" id="bot-deck-name">BOT</div>
    <div class="bot-hand-fan" id="bot-hand"></div>
  </div>

  <!-- Bot Board Half -->
  <div class="board-half" id="bot-board-half">
    <div class="board-zone char-zone" id="bot-character-zone">
      <span class="zone-title">Character</span>
      <div class="char-card bot-char" id="bot-character-card"></div>
    </div>
    <div class="board-zones-center">
      <div class="board-zone" id="bot-lessons-zone">
        <span class="zone-title">Lessons</span>
      </div>
      <div class="board-zone" id="bot-creatures-zone">
        <span class="zone-title">Creatures</span>
      </div>
    </div>
    <div class="edge-pile">
      <div class="pile-card discard-card" id="bot-discard">
        <span class="zone-title">Discard</span>
        <span class="pile-badge discard-badge" id="bot-discard-count">0</span>
      </div>
      <div class="pile-card deck-card" id="bot-deck">
        <span class="pile-badge" id="bot-deck-count">40</span>
      </div>
    </div>
  </div>

  <!-- Center Strip -->
  <div class="center-strip">
    <div class="action-indicator" id="action-indicator">
      <div class="big-action-dot" id="big-action-dot-1"></div>
      <div class="big-action-dot" id="big-action-dot-2"></div>
    </div>
  </div>

  <!-- Player Board Half -->
  <div class="board-half" id="player-board-half">
    <div class="board-zone char-zone" id="player-character-zone">
      <span class="zone-title">Character</span>
      <div class="char-card player-char" id="player-character-card"></div>
    </div>
    <div class="board-zones-center">
      <div class="board-zone" id="player-lessons-zone">
        <span class="zone-title">Lessons</span>
      </div>
      <div class="board-zone" id="player-creatures-zone">
        <span class="zone-title">Creatures</span>
      </div>
    </div>
    <div class="edge-pile">
      <div class="pile-card deck-card player-deck-card" id="player-deck">
        <span class="pile-badge player-badge" id="player-deck-count">40</span>
      </div>
      <div class="pile-card discard-card player-discard-card" id="player-discard">
        <span class="zone-title">Discard</span>
        <span class="pile-badge player-badge discard-badge" id="player-discard-count">0</span>
      </div>
    </div>
  </div>

  <!-- Player Hand (bottom) -->
  <div class="player-hand-row" id="player-hand-row">
    <div class="play-area-deck-name player-area-name" id="player-deck-name">YOU</div>
    <div class="player-hand-fan" id="player-hand"></div>
    <div class="play-area-controls">
      <button class="ctrl-btn" id="btn-draw" disabled onclick="UI.onDrawCard()">Draw (1)</button>
      <button class="ctrl-btn draw-btn" id="btn-end-turn" disabled onclick="UI.onEndTurn()">End Turn</button>
    </div>
  </div>

</main>

<!-- ══════════════════════════════════════════
     SIDEBAR — Bot info, Log, Player info
     ══════════════════════════════════════════ -->
<aside class="sidebar-left">

  <!-- Game Log -->
  <div class="log-section">
    <div class="log-header-bar">
      <span class="log-title">Duel Log</span>
      <span class="log-turn" id="log-turn">Turn 1</span>
    </div>
    <div id="game-log"></div>
  </div>

</aside>

<div id="card-hover-preview"></div>

<!-- Discard Viewer Modal -->
<div class="discard-viewer-overlay" id="discard-viewer" style="display:none">
  <div class="discard-viewer-modal">
    <div class="discard-viewer-header">
      <h2 class="discard-viewer-title" id="discard-viewer-title">Discard Pile</h2>
      <button class="discard-viewer-close" id="discard-viewer-close" type="button">&times;</button>
    </div>
    <div class="discard-viewer-grid" id="discard-viewer-grid"></div>
  </div>
</div>

<script src="js/cards.js"></script>
<script src="js/game.js"></script>
<script src="js/bot.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
